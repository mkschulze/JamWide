<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <!-- Neon strips on wall -->
  <rect x="100" y="200" width="8" height="680" rx="4" fill="#ff00ff" opacity="0.7" filter="url(#glow)"/>
  <rect x="160" y="250" width="6" height="580" rx="3" fill="#00ffff" opacity="0.5" filter="url(#glow)"/>
  <rect x="1760" y="200" width="8" height="680" rx="4" fill="#ff00ff" opacity="0.7" filter="url(#glow)"/>
  <rect x="1700" y="250" width="6" height="580" rx="3" fill="#00ffff" opacity="0.5" filter="url(#glow)"/>
  <!-- Acoustic panels -->
  <g opacity="0.15">
    <rect x="300" y="150" width="120" height="200" rx="8" fill="#333"/>
    <rect x="460" y="150" width="120" height="200" rx="8" fill="#2a2a2a"/>
    <rect x="620" y="150" width="120" height="200" rx="8" fill="#333"/>
    <rect x="1180" y="150" width="120" height="200" rx="8" fill="#333"/>
    <rect x="1340" y="150" width="120" height="200" rx="8" fill="#2a2a2a"/>
    <rect x="1500" y="150" width="120" height="200" rx="8" fill="#333"/>
  </g>
  <!-- Floor reflection -->
  <rect x="0" y="880" width="1920" height="200" fill="#0a0a1a" opacity="0.8"/>
  <line x1="0" y1="880" x2="1920" y2="880" stroke="#ff00ff" stroke-width="2" opacity="0.3" filter="url(#glow)"/>
  <!-- Subtle music notes floating -->
  <text x="400" y="500" font-size="80" fill="#ff00ff" opacity="0.08" font-family="serif">&#9835;</text>
  <text x="1400" y="400" font-size="60" fill="#00ffff" opacity="0.06" font-family="serif">&#9834;</text>
  <text x="900" y="300" font-size="100" fill="#ff00ff" opacity="0.05" font-family="serif">&#9833;</text>
</svg>
