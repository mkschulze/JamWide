<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JamWide Video</title>
  <script type="module" crossorigin src="/video/assets/main-DxT4qQrb.js"></script>
  <link rel="modulepreload" crossorigin href="/video/assets/ui-CD1IHXOM.js">
  <link rel="stylesheet" crossorigin href="/video/assets/main-B2cShgOM.css">
</head>
<body>
  <header id="header">
    <svg width="24" height="24" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#2563eb"/>
          <stop offset="100%" style="stop-color:#1d4ed8"/>
        </linearGradient>
      </defs>
      <rect width="100" height="100" rx="20" fill="url(#bg)"/>
      <text x="50" y="68" font-size="55" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-weight="bold">J</text>
    </svg>
    <h1>JamWide Video</h1>
    <span id="session-info"></span>
    <select id="bg-effect" title="Background effect">
      <option value="none">No Effect</option>
      <option value="blur">Blur Background</option>
      <option value="virtual-bg">Virtual Background</option>
    </select>
    <select id="bandwidth-profile" title="Video quality">
      <option value="low">Low (360p)</option>
      <option value="balanced" selected>Balanced (720p)</option>
      <option value="high">High (1080p)</option>
    </select>
    <span id="status-badge" class="badge-disconnected">Disconnected</span>
  </header>

  <main id="main-area">
    <p class="center-text">Connecting to JamWide plugin...</p>
    <div id="roster-strip" role="status" aria-label="Connected participants" style="display:none;"></div>
  </main>

  <footer id="footer">
    <span id="ws-dot" class="dot-disconnected"></span>
    <span id="ws-status-text">Disconnected</span>
    <button id="reconnect-btn" style="display:none;">Reconnect to Plugin</button>
  </footer>

</body>
</html>
