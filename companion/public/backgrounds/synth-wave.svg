<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a001a"/>
      <stop offset="40%" stop-color="#1a0033"/>
      <stop offset="70%" stop-color="#330044"/>
      <stop offset="100%" stop-color="#ff6600"/>
    </linearGradient>
    <filter id="g">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1920" height="1080" fill="url(#sky)"/>
  <!-- Sun -->
  <circle cx="960" cy="650" r="200" fill="#ff3366" opacity="0.8"/>
  <circle cx="960" cy="650" r="200" fill="none" stroke="#ff6699" stroke-width="3" opacity="0.5"/>
  <!-- Sun stripe cutouts -->
  <rect x="700" y="580" width="520" height="8" fill="#1a0033"/>
  <rect x="700" y="600" width="520" height="12" fill="#1a0033"/>
  <rect x="700" y="626" width="520" height="16" fill="#1a0033"/>
  <rect x="700" y="658" width="520" height="22" fill="#1a0033"/>
  <!-- Grid floor -->
  <g stroke="#ff00ff" stroke-width="1" opacity="0.3">
    <!-- Horizontal lines (perspective) -->
    <line x1="0" y1="750" x2="1920" y2="750"/>
    <line x1="0" y1="800" x2="1920" y2="800"/>
    <line x1="0" y1="860" x2="1920" y2="860"/>
    <line x1="0" y1="930" x2="1920" y2="930"/>
    <line x1="0" y1="1010" x2="1920" y2="1010"/>
    <!-- Vertical lines (converging) -->
    <line x1="960" y1="700" x2="0" y2="1080"/>
    <line x1="960" y1="700" x2="240" y2="1080"/>
    <line x1="960" y1="700" x2="480" y2="1080"/>
    <line x1="960" y1="700" x2="720" y2="1080"/>
    <line x1="960" y1="700" x2="960" y2="1080"/>
    <line x1="960" y1="700" x2="1200" y2="1080"/>
    <line x1="960" y1="700" x2="1440" y2="1080"/>
    <line x1="960" y1="700" x2="1680" y2="1080"/>
    <line x1="960" y1="700" x2="1920" y2="1080"/>
  </g>
  <!-- Stars -->
  <g fill="white" opacity="0.5">
    <circle cx="200" cy="100" r="1.5"/><circle cx="500" cy="60" r="1"/>
    <circle cx="800" cy="120" r="1.5"/><circle cx="1100" cy="80" r="1"/>
    <circle cx="1400" cy="150" r="1.5"/><circle cx="1700" cy="90" r="1"/>
    <circle cx="350" cy="250" r="1"/><circle cx="1550" cy="200" r="1"/>
  </g>
  <!-- Horizon glow -->
  <rect x="0" y="690" width="1920" height="20" fill="#ff6600" opacity="0.15" filter="url(#g)"/>
</svg>
