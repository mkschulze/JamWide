<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="wall" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a1a0a"/>
      <stop offset="100%" stop-color="#1a1008"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#wall)"/>
  <!-- Brick texture -->
  <g opacity="0.08">
    <rect x="0" y="0" width="200" height="60" rx="2" stroke="#000" stroke-width="1" fill="none"/>
    <rect x="220" y="0" width="200" height="60" rx="2" stroke="#000" stroke-width="1" fill="none"/>
    <rect x="110" y="70" width="200" height="60" rx="2" stroke="#000" stroke-width="1" fill="none"/>
    <rect x="330" y="70" width="200" height="60" rx="2" stroke="#000" stroke-width="1" fill="none"/>
  </g>
  <!-- Vinyl records on wall -->
  <g transform="translate(300,200)">
    <circle cx="0" cy="0" r="80" fill="#111" stroke="#222" stroke-width="2"/>
    <circle cx="0" cy="0" r="50" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    <circle cx="0" cy="0" r="35" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    <circle cx="0" cy="0" r="15" fill="#cc3333" stroke="#222" stroke-width="1"/>
    <circle cx="0" cy="0" r="3" fill="#333"/>
  </g>
  <g transform="translate(550,300)">
    <circle cx="0" cy="0" r="80" fill="#111" stroke="#222" stroke-width="2"/>
    <circle cx="0" cy="0" r="50" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    <circle cx="0" cy="0" r="35" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    <circle cx="0" cy="0" r="15" fill="#3366cc" stroke="#222" stroke-width="1"/>
    <circle cx="0" cy="0" r="3" fill="#333"/>
  </g>
  <g transform="translate(1400,250)">
    <circle cx="0" cy="0" r="80" fill="#111" stroke="#222" stroke-width="2"/>
    <circle cx="0" cy="0" r="50" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    <circle cx="0" cy="0" r="35" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    <circle cx="0" cy="0" r="15" fill="#cc9933" stroke="#222" stroke-width="1"/>
    <circle cx="0" cy="0" r="3" fill="#333"/>
  </g>
  <g transform="translate(1600,400)">
    <circle cx="0" cy="0" r="80" fill="#111" stroke="#222" stroke-width="2"/>
    <circle cx="0" cy="0" r="50" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    <circle cx="0" cy="0" r="35" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    <circle cx="0" cy="0" r="15" fill="#33cc66" stroke="#222" stroke-width="1"/>
    <circle cx="0" cy="0" r="3" fill="#333"/>
  </g>
  <g transform="translate(850,200)">
    <circle cx="0" cy="0" r="80" fill="#111" stroke="#222" stroke-width="2"/>
    <circle cx="0" cy="0" r="50" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    <circle cx="0" cy="0" r="35" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    <circle cx="0" cy="0" r="15" fill="#cc33cc" stroke="#222" stroke-width="1"/>
    <circle cx="0" cy="0" r="3" fill="#333"/>
  </g>
  <!-- Warm light from left -->
  <rect x="0" y="0" width="400" height="1080" fill="#ff9900" opacity="0.04"/>
  <!-- Shelf -->
  <rect x="200" y="550" width="1520" height="8" fill="#1a1008" stroke="#2a1a0a" stroke-width="1"/>
  <!-- Guitar silhouette leaning on wall -->
  <g transform="translate(1100,560)" opacity="0.15">
    <ellipse cx="0" cy="120" rx="45" ry="55" fill="#111" stroke="#222"/>
    <ellipse cx="0" cy="0" rx="35" ry="45" fill="#111" stroke="#222"/>
    <rect x="-5" y="-200" width="10" height="200" fill="#111"/>
    <rect x="-20" y="-220" width="40" height="25" rx="3" fill="#111"/>
  </g>
</svg>
